name: Run central coordinator script

on:
  workflow_call:
    inputs:
      workpackage_id:
        description: "The id of the work package to be executed"
        required: true
        type: string
      filepath:
        description: "The filepath of the file to be processed"
        required: true
        type: string
      workpackage_json: # either link to file or json as string
        description: "The workpackage json as string"
        required: false # should not be optional, but needs to be changed in mei-friend first
        type: string
      addargs:
        description: "Additional arguments required by the work package"
        required: false
        type: string
        default: ""
      commit_message:
        description: "The commit message"
        required: true
        default: "GitHub Action: Apply work package to filepath"
        type: string

jobs:
  run-shared-script:
    runs-on: ubuntu-latest
    permissions: # taken from https://github.com/stefanzweifel/git-auto-commit-action#usage
      # Give the default GITHUB_TOKEN write permission to commit and push the
      # added or changed files to the repository.
      contents: write

    steps:
      # 1. Checkout caller repository
      - name: Checkout caller repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.ref }}
          path: caller-repo
          persist-credentials: true # needed for pushing changes back to caller repo according to siehe oben

      # 2. Checkout shared repository (this repo)
      - name: Checkout central repository
        uses: actions/checkout@v6
        with:
          repository: mei-friend/automation
          ref: main
          path: central-repo

      # 3. Setup Python with cached dependencies
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "central-repo/scripts/requirements.txt"

      # 4. Install dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r central-repo/scripts/requirements.txt

      # 5. Run the shared script *on the caller repo*
      - name: Run central coordinator script
        run: |
          addargs='${{ inputs.addargs }}'

          if [ -n "$addargs" ]; then
            python "$GITHUB_WORKSPACE/central-repo/scripts/coordinator.py" -w ${{ inputs.workpackage_id }} -f ${{ inputs.filepath }} -a "$addargs"
          else
            python "$GITHUB_WORKSPACE/central-repo/scripts/coordinator.py" -w ${{ inputs.workpackage_id }} -f ${{ inputs.filepath }}
          fi

      # 6. Commit changes
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: ${{ inputs.commit_message }}
          repository: caller-repo
